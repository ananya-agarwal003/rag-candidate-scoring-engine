<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAG Candidate Scoring Engine</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        textarea { width: 100%; height: 150px; margin: 10px 0; padding: 10px; font-size: 14px; }
        input[type="file"] { margin: 10px 0; }
        button { background: #4CAF50; color: white; padding: 12px 30px; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; }
        button:hover { background: #45a049; }
        #result { margin-top: 20px; padding: 20px; background: white; border-radius: 4px; white-space: pre-wrap; display: none; }
        #loading { display: none; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>RAG Candidate Scoring Engine</h1>
    <label>Upload Resume (PDF):</label><br>
    <input type="file" id="resume" accept=".pdf"><br>
    <label>Job Description:</label>
    <textarea id="jd" placeholder="Paste job description here..."></textarea>
    <button onclick="scoreResume()">Get Score</button>
    <div id="loading">Analyzing resume... please wait</div>
    <div id="result"></div>

    <script>
        async function scoreResume() {
            const resume = document.getElementById('resume').files[0];
            const jd = document.getElementById('jd').value;
            if (!resume || !jd) { alert('Please upload resume and enter job description'); return; }
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            const formData = new FormData();
            formData.append('resume', resume);
            formData.append('job_description', jd);
            try {
                const response = await fetch('http://127.0.0.1:8000/score', { method: 'POST', body: formData });
                const data = await response.json();
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').innerText = data.result;
            } catch (e) {
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').innerText = 'Error: Make sure the server is running.';
            }
            document.getElementById('loading').style.display = 'none';
        }
    </script>
</body>
</html>
